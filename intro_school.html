<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오시는 길 | 임마누엘신학교</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary-blue: #0056b3;
            --text-dark: #222;
            --text-gray: #666;
            --bg-light: #f9f9fb;
            --border-color: #e1e4e8;
        }

        body {
            margin: 0;
            font-family: 'Pretendard Variable', sans-serif;
            color: var(--text-dark);
            background-color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 헤더 & 네비 */
        header { padding: 30px 0; border-bottom: 1px solid var(--border-color); text-align: center; }
        .logo h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
        .logo span { color: var(--text-gray); font-size: 0.9rem; }

        /* 히어로 섹션 */
        .page-header { padding: 60px 0 40px; }
        .category { color: var(--primary-blue); font-weight: 600; font-size: 0.9rem; }
        .page-header h2 { font-size: 2.2rem; margin: 10px 0; font-weight: 800; }
        .page-header p { color: var(--text-gray); font-size: 1.1rem; }

        /* 메인 콘텐츠 레이아웃 */
        .info-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .location-box h3 { font-size: 1.6rem; margin-bottom: 20px; }
        .address { font-size: 1.25rem; font-weight: 600; margin-bottom: 15px; display: block; }
        
        .info-list { list-style: none; padding: 0; }
        .info-list li { margin-bottom: 12px; padding-left: 25px; position: relative; }
        .info-list li i { position: absolute; left: 0; top: 5px; color: var(--primary-blue); }

        /* 우측 안내 박스 */
        .notice-card {
            background: var(--bg-light);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .notice-card h4 { margin-top: 0; font-size: 1.2rem; }
        .contact-info { margin: 20px 0; font-size: 0.95rem; }
        .contact-info div { margin-bottom: 10px; display: flex; justify-content: space-between; }
        .btn-reservation {
            display: block;
            text-align: center;
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-reservation:hover { background: #eee; }

        /* 교통수단 상세 (지도 대체 영역) */
        .transport-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding: 40px 0;
            border-top: 1px solid var(--border-color);
        }
        .trans-item { text-align: center; padding: 20px; }
        .trans-item i { font-size: 2.5rem; color: var(--primary-blue); margin-bottom: 15px; }
        .trans-item h5 { font-size: 1.1rem; margin: 10px 0; }
        .trans-item p { font-size: 0.9rem; color: var(--text-gray); }

        /* 푸터 */
        footer { background: #1a1a1a; color: #fff; padding: 50px 0; font-size: 0.9rem; }
        .footer-content { display: flex; justify-content: space-between; opacity: 0.8; }
